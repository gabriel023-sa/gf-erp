services:
  postgres:
    image: postgres:16-alpine
    container_name: gf-erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gf_erp
      POSTGRES_USER: gf_erp
      POSTGRES_PASSWORD: gf_erp_dev
    ports:
      - "5432:5432"
    volumes:
      - gf_erp_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gf_erp -d gf_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  gf_erp_postgres:
